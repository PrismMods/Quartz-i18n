name: validate

# Checks every translation file on PRs and pushes: JSON validity, the 0KTL
# sentinel, and key parity against en-US. No secrets are used here, so it is safe
# to run on pull requests from forks.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/validate.py Lang Lang/en-US.json
